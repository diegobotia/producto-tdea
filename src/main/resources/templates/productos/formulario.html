<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${producto.id == null ? 'Nuevo producto' : 'Editar producto'}">Producto</title>
  <style>
    :root { --bg:#0f1419; --surface:#1a2332; --text:#e8ecf1; --muted:#8b9aab; --accent:#3d9cf5; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    header { display:flex; gap:1rem; align-items:flex-start; justify-content:space-between; margin-bottom: 1.25rem; }
    h1 { font-size: 1.5rem; margin:0; }
    .card { background: var(--surface); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; padding: 1rem; }
    label { display:block; margin-top: .9rem; margin-bottom: .35rem; color: var(--muted); font-size:.9rem; }
    input { width:100%; padding:.65rem .75rem; border-radius: 10px; border: 1px solid rgba(255,255,255,.12); background: rgba(15,20,25,.55); color: var(--text); }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } }
    .actions { margin-top: 1.25rem; display:flex; gap:.6rem; flex-wrap:wrap; }
    a.btn, button.btn { display:inline-block; padding:.55rem .9rem; border-radius:10px; border: 1px solid rgba(255,255,255,.12); background: transparent; color: var(--text); text-decoration:none; cursor:pointer; }
    button.primary { background: var(--accent); border-color: transparent; color: #04121f; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1 th:text="${producto.id == null ? 'Nuevo producto' : 'Editar producto'}">Producto</h1>
        <div style="color:var(--muted); font-size:.95rem;">Completa el formulario y guarda.</div>
      </div>
      <div>
        <a class="btn" href="/productos">Volver</a>
      </div>
    </header>

    <div class="card">
      <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" th:field="*{nombre}" placeholder="Ej. Teclado mecánico" required>

        <label for="precio">Precio</label>
        <input id="precio" type="number" step="0.01" min="0" th:field="*{precio}" placeholder="Ej. 199.99" required>

        <div class="actions">
          <button class="btn primary" type="submit">Guardar</button>
          <a class="btn" href="/productos">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
